# gradle/libs.versions.toml

[metadata]
title = "MCSMSForwarder TOML"

[versions]
# Build System
agp = "8.13.0"  # Android Gradle Plugin
kotlin = "1.9.24" # Kotlin Gradle Plugin & Stdlib version

# Android SDK
compileSdk = "36"
minSdk = "33"
targetSdk = "36"

# Libraries
androidxCoreKtx = "1.12.0" # Updated example, use latest stable
androidxAppCompat = "1.6.1" # Updated example, use latest stable
googleMaterial = "1.11.0"  # Updated example, use latest stable
androidxConstraintLayout = "2.1.4" # Current version
androidxWorkManager = "2.9.0" # Updated example, use latest stable

# Test Libraries (Add if you use them)
# junit = "4.13.2"
# androidxTestExtJunit = "1.1.5"
# androidxTestEspressoCore = "3.5.1"

[libraries]
# AndroidX
androidx-core-ktx = { group = "androidx.core", name = "core-ktx", version.ref = "androidxCoreKtx" }
androidx-appcompat = { group = "androidx.appcompat", name = "appcompat", version.ref = "androidxAppCompat" }
androidx-constraintlayout = { group = "androidx.constraintlayout", name = "constraintlayout", version.ref = "androidxConstraintLayout" }
androidx-work-runtime-ktx = { group = "androidx.work", name = "work-runtime-ktx", version.ref = "androidxWorkManager" }

# Google
google-material = { group = "com.google.android.material", name = "material", version.ref = "googleMaterial" }

# Kotlin Standard Library (usually brought in by the plugin, but can be explicit)
kotlin-stdlib = { group = "org.jetbrains.kotlin", name = "kotlin-stdlib", version.ref = "kotlin" }

# Test Libraries (Uncomment and add if you use them)
# junit = { group = "junit", name = "junit", version.ref = "junit" }
# androidx-test-ext-junit = { group = "androidx.test.ext", name = "junit", version.ref = "androidxTestExtJunit" }
# androidx-test-espresso-core = { group = "androidx.test.espresso", name = "espresso-core", version.ref = "androidxTestEspressoCore" }

[plugins]
# These IDs are used in the module-level build.gradle.kts 'plugins' block
android-application = { id = "com.android.application", version.ref = "agp" }
android-library = { id = "com.android.library", version.ref = "agp" } # If you have library modules
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
# Add other plugins here, e.g., KSP, Hilt, Google Services
# google-devtools-ksp = { id = "com.google.devtools.ksp", version.ref = "kspVersion" } # Define kspVersion in [versions]
# google-gms-googleServices = { id = "com.google.gms.google-services", version.ref = "googleServicesPluginVersion" } # Define version
